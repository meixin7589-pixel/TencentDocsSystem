<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>腾讯文档同步系统</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f0f2f5;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #333;
        }
        .container {
            background-color: #fff;
            border-radius: 8px;
            padding: 30px;
            display: inline-block;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .account-info p {
            margin: 8px 0;
            font-size: 18px;
        }
        button {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            background-color: #0078d4;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #005a9e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>腾讯文档同步系统</h1>
        <p>企业内部测试环境</p>
        <div class="account-info">
            <p>测试账号：<strong>test001</strong></p>
            <p>密码：<strong>123456</strong></p>
        </div>
        <button onclick="alert('同步成功')">执行同步</button>
    </div>
</body>
</html>
